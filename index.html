<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 상황에 맞는 강의 찾기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f7f6f3;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  .hero {
    background: #1a1a2e;
    color: #fff;
    padding: 3rem 1.5rem 2.5rem;
    text-align: center;
  }
  .hero-label {
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #a78bfa;
    margin-bottom: 0.75rem;
  }
  .hero h1 {
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 0.75rem;
  }
  .hero p {
    font-size: 15px;
    color: #c4b5fd;
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.7;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.25rem 0;
  }

  .filter-label {
    font-size: 12px;
    color: #888;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 2rem;
  }
  .tag-btn {
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid #ddd;
    background: #fff;
    color: #555;
    transition: all 0.15s;
    font-family: inherit;
  }
  .tag-btn:hover { border-color: #a78bfa; color: #6d28d9; background: #f5f3ff; }
  .tag-btn.active { background: #6d28d9; color: #fff; border-color: #6d28d9; }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 14px;
    padding: 1.1rem 1.25rem;
    cursor: pointer;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); border-color: #c4b5fd; }
  .card.expanded { border-color: #7c3aed; box-shadow: 0 2px 16px rgba(109,40,217,0.1); }

  .card-header { display: flex; align-items: flex-start; gap: 10px; }
  .card-icon {
    width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .card-q {
    font-size: 14px; font-weight: 600; color: #1a1a1a;
    line-height: 1.55; flex: 1;
  }
  .card-tag {
    display: inline-block; font-size: 11px; padding: 2px 9px;
    border-radius: 10px; margin-top: 5px; font-weight: 500;
  }
  .chevron {
    margin-left: auto; font-size: 16px; color: #aaa;
    flex-shrink: 0; transition: transform 0.2s; margin-top: 2px;
  }
  .card.expanded .chevron { transform: rotate(180deg); }

  .card-lectures {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid #f0f0f0;
    display: none;
  }
  .card.expanded .card-lectures { display: block; }
  .lectures-label {
    font-size: 11px; color: #aaa; margin-bottom: 10px;
    text-transform: uppercase; letter-spacing: 0.07em;
  }

  .lecture-pill {
    display: inline-block; font-size: 12px; padding: 5px 11px;
    border-radius: 20px; margin: 3px 4px 3px 0;
    border: 1px solid #e0e0e0;
    background: #f7f7f7; color: #555;
    text-decoration: none; cursor: default;
    font-family: inherit; transition: filter 0.12s;
  }
  .lecture-pill.prime { background: #f5f3ff; color: #5b21b6; border-color: #c4b5fd; }
  .lecture-pill.free  { background: #f0fdf4; color: #166534; border-color: #86efac; }
  .lecture-pill.consult { background: #fff7ed; color: #9a3412; border-color: #fdba74; }
  .lecture-pill.membership { background: #eff6ff; color: #1e40af; border-color: #93c5fd; }
  .lecture-pill.has-link { cursor: pointer; }
  .lecture-pill.has-link:hover { filter: brightness(0.93); text-decoration: underline; }
  .link-icon { font-size: 11px; margin-left: 3px; opacity: 0.65; vertical-align: middle; }

  .legend {
    margin-top: 2.5rem;
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
  }
  .legend-title { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
  .legend-items { display: flex; flex-wrap: wrap; gap: 8px; }
  .legend-item {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: #555;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }

  .empty { padding: 2.5rem; text-align: center; color: #aaa; font-size: 14px; }

  @media (max-width: 480px) {
    .hero { padding: 2.5rem 1.25rem 2rem; }
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

    lectures: [
      { name: "내집마련반", type: "" }, { name: "내집마련완성반", type: "" },
      { name: "경매&실전반", type: "" },

    tagLabel: "재개발", tagBg: "#fffbeb", tagColor: "#92400e",

    ]

];

let activeFilter = "all";

function getPillClass(type, hasUrl) {
  let cls = "lecture-pill";
  if (type === "prime") cls += " prime";
  else if (type === "free") cls += " free";
  else if (type === "consult") cls += " consult";
  else if (type === "membership") cls += " membership";
  if (hasUrl) cls += " has-link";
  return cls;
}

function renderPill(l) {
  const url = URLS[l.name];
  if (url) {
    return `<a href="${url}" target="_blank" rel="noopener" class="${getPillClass(l.type, true)}" onclick="event.stopPropagation()">${l.name}<i class="ti ti-external-link link-icon"></i></a>`;
  }
  return `<span class="${getPillClass(l.type, false)}">${l.name}</span>`;
}

function renderCards() {
  const grid = document.getElementById("cardsGrid");
  const filtered = activeFilter === "all" ? data : data.filter(d => d.tags.includes(activeFilter));
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">해당 카테고리의 항목이 없습니다.</div>';
    return;
  }
  grid.innerHTML = filtered.map(item => `
    <div class="card" onclick="this.classList.toggle('expanded')">
      <div class="card-header">
        <div class="card-icon" style="background:${item.iconBg}">${item.icon}</div>
        <div style="flex:1">
          <div class="card-q">${item.q}</div>
          <span class="card-tag" style="background:${item.tagBg};color:${item.tagColor}">${item.tagLabel}</span>
        </div>
        <i class="ti ti-chevron-down chevron"></i>
      </div>
      <div class="card-lectures">
        <div class="lectures-label">추천 강의</div>
        ${item.lectures.map(l => renderPill(l)).join("")}
      </div>
    </div>
  `).join("");
}

document.getElementById("filterBar").addEventListener("click", e => {
  const btn = e.target.closest(".tag-btn");
  if (!btn) return;
  activeFilter = btn.dataset.filter;
  document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderCards();
});

renderCards();
</script>

</html>
